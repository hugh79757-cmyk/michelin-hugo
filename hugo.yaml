baseURL: "https://michelin.techpawz.com/"
languageCode: "en-us"
title: "TechPawz Michelin - World Michelin Guide Restaurant Reviews"
theme: "blowfish"

defaultContentLanguage: "en"
enableRobotsTXT: true
pagination:
  pagerSize: 12
summaryLength: 30
buildDrafts: false

outputs:
  home:
    - HTML
    - RSS
    - JSON

markup:
  goldmark:
    renderer:
      unsafe: true
  tableOfContents:
    endLevel: 3
    ordered: false
    startLevel: 2
  highlight:
    noClasses: false

params:
  colorScheme: "fire"
  defaultAppearance: "light"
  autoSwitchAppearance: true

  header:
    layout: "basic"
    showTitle: true

  footer:
    showCopyright: true
    showThemeAttribution: false
    showAppearanceSwitcher: true
    showScrollToTop: true

  homepage:
    layout: "profile"
    homepageImage: ""
    showRecent: true
    showRecentItems: 12
    showMoreLink: true
    showMoreLinkDest: "/posts"
    cardView: true
    cardViewScreenWidth: false
    layoutBackgroundBlur: true

  article:
    showDate: true
    showViews: false
    showLikes: false
    showDateUpdated: true
    showAuthor: false
    showBreadcrumbs: true
    showDraftLabel: true
    showEdit: false
    showHeadingAnchors: true
    showPagination: true
    showReadingTime: true
    showTableOfContents: true
    showTaxonomies: true
    showWordCount: false
    sharingLinks:
      - twitter
      - facebook
      - pinterest
      - reddit

  taxonomy:
    showTermCount: true
    showHero: false

  sitemap:
    excludedKinds:
      - taxonomy
      - term

  robots: "index, follow"

  author:
    name: "TechPawz Michelin"
    headline: "Every Michelin Star Restaurant, Reviewed"
    bio: "Comprehensive guide to Michelin-starred and Bib Gourmand restaurants worldwide. Cuisine types, price ranges, and insider tips."

taxonomies:
  tag: tags
  category: categories

menus:
  main:
    - name: "Restaurants"
      url: "/posts/"
      weight: 10
    - name: "By City"
      url: "/categories/"
      weight: 20
    - name: "Cuisine"
      url: "/tags/"
      weight: 30
